description: Configuration file for checklist::check_pkg()
package: yes
allowed:
  warnings:
  - motivation: Package not for CRAN
    value: |-
      checking CRAN incoming feasibility ... WARNING
      Maintainer: 'Thierry Onkelinx <thierry.onkelinx@inbo.be>'

      New submission

      Strong dependencies not in mainstream repositories:
        checklist
      Availability using Additional_repositories specification:
        checklist   yes   https://inbo.r-universe.dev
  notes: []
required:
- CITATION
- DESCRIPTION
- R CMD check
- checklist
- codemeta
- documentation
- filename conventions
- folder conventions
- license
- lintr
- organisation
- repository secret
- spelling
spelling:
  default: en-GB
  ignore:
  - .github
  - LICENSE.md
  - docs
  - tests/testthat/species_template.qmd
  - tests/testthat/iris_chapter.qmd
pak: pdftools
