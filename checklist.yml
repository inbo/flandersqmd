description: Configuration file for checklist::check_pkg()
package: yes
allowed:
  warnings:
  - motivation: Package not on CRAN
    value: |-
      checking CRAN incoming feasibility ... WARNING
      Maintainer: 'Thierry Onkelinx <thierry.onkelinx@inbo.be>'

      New submission

      Strong dependencies not in the CRAN or BioC software repositories:
        checklist, citeme
      Availability using Additional_repositories specification:
        checklist   yes   https://inbo.r-universe.dev
        citeme      yes   https://inbo.r-universe.dev
  - motivation: To do in a later stage
    value: |-
      checking for code which exercises the package ... WARNING
      No examples, no tests, no vignettes
  notes: []
required:
- CITATION
- DESCRIPTION
- R CMD check
- checklist
- documentation
- filename conventions
- folder conventions
- license
- lintr
- organisation
- repository secret
- spelling
spelling:
  default: en-GB
  ignore:
  - .github
  - docs
  - LICENSE.md
pak:
- googledrive
- googlesheets4
- stringr
gha_install: []
